<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 360" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <style>
      .node{fill:#e8f4f1;stroke:#328976;stroke-width:1.5;rx:10;}
      .store{fill:#eef2ff;stroke:#4f46e5;}
      .term{fill:#fef3f2;stroke:#d1603a;}
      .lbl{fill:#0f2e28;font-size:14px;font-weight:600;text-anchor:middle;}
      .sub{fill:#4b5563;font-size:11px;text-anchor:middle;}
      .stage{fill:#328976;font-size:13px;font-weight:700;}
      .edge{stroke:#6b7280;stroke-width:1.6;fill:none;}
    </style>
  </defs>

  <text x="24" y="34" class="stage">1 · Ingest  (build the index, once)</text>
  <rect class="node" x="24"  y="52" width="150" height="60" rx="10"/>
  <text class="lbl" x="99" y="80">Document To Text</text>
  <text class="sub" x="99" y="98">read PDF / DOCX</text>
  <rect class="node" x="234" y="52" width="150" height="60" rx="10"/>
  <text class="lbl" x="309" y="80">Text Embedder</text>
  <text class="sub" x="309" y="98">chunk + embed</text>
  <rect class="node store" x="444" y="52" width="180" height="60" rx="10"/>
  <text class="lbl" x="534" y="80">Save to Pinecone / FAISS</text>
  <text class="sub" x="534" y="98">store vectors + text</text>
  <path class="edge" d="M174,82 L232,82" marker-end="url(#arr)"/>
  <path class="edge" d="M384,82 L442,82" marker-end="url(#arr)"/>

  <text x="24" y="176" class="stage">2 · Retrieve &amp; answer  (per question)</text>
  <rect class="node term" x="24"  y="194" width="120" height="60" rx="10"/>
  <text class="lbl" x="84" y="222">Question</text>
  <text class="sub" x="84" y="240">user query</text>
  <rect class="node" x="182" y="194" width="140" height="60" rx="10"/>
  <text class="lbl" x="252" y="222">Text Embedder</text>
  <text class="sub" x="252" y="240">embed query</text>
  <rect class="node store" x="360" y="194" width="170" height="60" rx="10"/>
  <text class="lbl" x="445" y="222">Read from Vector DB</text>
  <text class="sub" x="445" y="240">top-K nearest chunks</text>
  <rect class="node" x="568" y="194" width="150" height="60" rx="10"/>
  <text class="lbl" x="643" y="222">Multi LLM Query</text>
  <text class="sub" x="643" y="240">answer from context</text>
  <rect class="node term" x="756" y="194" width="160" height="60" rx="10"/>
  <text class="lbl" x="836" y="222">Grounded Answer</text>
  <text class="sub" x="836" y="240">cited, no hallucination</text>
  <path class="edge" d="M144,224 L180,224" marker-end="url(#arr)"/>
  <path class="edge" d="M322,224 L358,224" marker-end="url(#arr)"/>
  <path class="edge" d="M530,224 L566,224" marker-end="url(#arr)"/>
  <path class="edge" d="M718,224 L754,224" marker-end="url(#arr)"/>

  <path class="edge" d="M534,112 C534,150 445,150 445,192" marker-end="url(#arr)" stroke-dasharray="5 4"/>
  <text class="sub" x="490" y="150" text-anchor="start" fill="#4f46e5">same index</text>
</svg>
