<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a4" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <style>
      .hub{fill:#328976;stroke:#1f5e50;stroke-width:2;}
      .hubt{fill:#ffffff;font-size:15px;font-weight:700;text-anchor:middle;}
      .hubs{fill:#d1fae5;font-size:11px;text-anchor:middle;}
      .in{fill:#f0fdfa;stroke:#0d9488;stroke-width:1.3;}
      .int{fill:#0f766e;font-size:12px;font-weight:600;text-anchor:middle;}
      .out{fill:#eef2ff;stroke:#4f46e5;stroke-width:1.3;}
      .outt{fill:#3730a3;font-size:12px;font-weight:600;text-anchor:middle;}
      .e{stroke:#9ca3af;stroke-width:1.5;fill:none;}
      .lab{fill:#328976;font-size:13px;font-weight:700;}
      .s{fill:#6b7280;font-size:10.5px;text-anchor:middle;}
    </style>
  </defs>

  <text x="24" y="28" class="lab">Multi LLM Query — one node, configured for many tasks</text>

  <!-- inputs (config) -->
  <text x="30" y="62" class="s" text-anchor="start" fill="#0f766e">configure</text>
  <rect class="in" x="30" y="72"  width="150" height="34" rx="8"/><text class="int" x="105" y="94">Connection (LLM)</text>
  <rect class="in" x="30" y="118" width="150" height="34" rx="8"/><text class="int" x="105" y="140">Input: text / image</text>
  <rect class="in" x="30" y="164" width="150" height="34" rx="8"/><text class="int" x="105" y="186">Prompt + query col</text>
  <rect class="in" x="30" y="210" width="150" height="34" rx="8"/><text class="int" x="105" y="232">Aggregate: none/perfile/all</text>

  <!-- hub -->
  <rect class="hub" x="340" y="120" width="180" height="90" rx="14"/>
  <text class="hubt" x="430" y="158">Multi LLM Query</text>
  <text class="hubs" x="430" y="180">row → LLM → response</text>

  <path class="e" d="M180,89  C260,89 270,150 338,150" marker-end="url(#a4)"/>
  <path class="e" d="M180,135 L338,150" marker-end="url(#a4)"/>
  <path class="e" d="M180,181 L338,165" marker-end="url(#a4)"/>
  <path class="e" d="M180,227 C260,227 270,175 338,175" marker-end="url(#a4)"/>

  <!-- task outputs -->
  <text x="700" y="40" class="s" fill="#3730a3">…to do any of</text>
  <rect class="out" x="640" y="52"  width="230" height="30" rx="8"/><text class="outt" x="755" y="72">Summarize (per row / doc / corpus)</text>
  <rect class="out" x="640" y="90"  width="230" height="30" rx="8"/><text class="outt" x="755" y="110">Question answering (RAG)</text>
  <rect class="out" x="640" y="128" width="230" height="30" rx="8"/><text class="outt" x="755" y="148">Extract fields → JSON</text>
  <rect class="out" x="640" y="166" width="230" height="30" rx="8"/><text class="outt" x="755" y="186">Translate</text>
  <rect class="out" x="640" y="204" width="230" height="30" rx="8"/><text class="outt" x="755" y="224">Classify / sentiment</text>
  <rect class="out" x="640" y="242" width="230" height="30" rx="8"/><text class="outt" x="755" y="262">Image &amp; multimodal understanding</text>

  <path class="e" d="M520,140 C580,120 590,67  638,67"  marker-end="url(#a4)"/>
  <path class="e" d="M520,150 C580,140 590,105 638,105" marker-end="url(#a4)"/>
  <path class="e" d="M520,160 C580,160 590,143 638,143" marker-end="url(#a4)"/>
  <path class="e" d="M520,168 C580,178 590,181 638,181" marker-end="url(#a4)"/>
  <path class="e" d="M520,176 C580,196 590,219 638,219" marker-end="url(#a4)"/>
  <path class="e" d="M520,186 C580,214 590,257 638,257" marker-end="url(#a4)"/>

  <text x="430" y="300" class="s">The same node changes behaviour by prompt, input mode and aggregate mode — no new nodes needed.</text>
</svg>
